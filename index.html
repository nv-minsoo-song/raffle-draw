<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>행운권 추첨</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101112;
      --panel: #191a1d;
      --panel-2: #202226;
      --ink: #fffaf0;
      --muted: #aeb3ad;
      --line: #32363b;
      --accent: #ffd24a;
      --accent-2: #36d4ac;
      --danger: #ff7373;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      overflow: hidden;
    }

    html[lang="ja"] body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(260px, 330px) minmax(0, 1fr) minmax(260px, 340px);
      height: 100%;
      min-height: 100%;
    }

    .setup,
    .history {
      background: var(--panel);
      border-color: var(--line);
      border-style: solid;
      padding: 22px;
      overflow: auto;
    }

    .setup {
      border-width: 0 1px 0 0;
    }

    .history {
      border-width: 0 0 0 1px;
    }

    .brand {
      margin: 0 0 20px;
    }

    .brand-title {
      display: block;
      font-size: 26px;
      font-weight: 850;
      letter-spacing: 0;
      line-height: 1.05;
    }

    .brand-subtitle {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .language-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #111214;
      padding: 4px;
    }

    .language-button {
      min-height: 38px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      transition: background 160ms ease, color 160ms ease;
    }

    .language-button:hover {
      color: var(--ink);
    }

    .language-button.is-active {
      background: var(--accent);
      color: #171511;
    }

    .field-label {
      display: block;
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .title-input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111214;
      color: var(--ink);
      padding: 10px 12px;
      outline: none;
    }

    .title-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 210, 74, 0.18);
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .drop-zone {
      display: grid;
      min-height: 118px;
      place-items: center;
      border: 1px dashed #5f6668;
      border-radius: 8px;
      background: #131517;
      color: var(--ink);
      padding: 18px;
      text-align: center;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .drop-zone strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 18px;
    }

    .drop-zone span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .drop-zone.is-dragging {
      border-color: var(--accent-2);
      background: rgba(54, 212, 172, 0.12);
      transform: translateY(-1px);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0;
    }

    .stat {
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 12px;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat-value {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      font-weight: 850;
      line-height: 1;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    .action-button,
    .big-draw {
      min-height: 46px;
      border-radius: 8px;
      background: #2a2d31;
      color: var(--ink);
      font-weight: 800;
      box-shadow: none;
    }

    .action-button:hover:not(:disabled),
    .big-draw:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .action-button.primary,
    .big-draw {
      background: var(--accent);
      color: #171511;
    }

    .action-button.danger {
      background: #3a2427;
      color: #ffd7d7;
    }

    .draw-count-control {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 44px;
      gap: 8px;
      margin: 8px 0 18px;
    }

    .step-button,
    .draw-count-input {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141619;
      color: var(--ink);
      font-weight: 850;
    }

    .step-button {
      color: var(--accent);
      font-size: 22px;
      line-height: 1;
    }

    .draw-count-input {
      width: 100%;
      text-align: center;
      outline: none;
      font-size: 18px;
    }

    .draw-count-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 210, 74, 0.18);
    }

    .hint {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .stage {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      padding: 26px;
      background:
        linear-gradient(180deg, rgba(255, 210, 74, 0.05), transparent 34%),
        var(--bg);
    }

    .stage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    .event-title {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 34px);
      font-weight: 850;
      letter-spacing: 0;
      line-height: 1.18;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      flex: 0 0 auto;
      max-width: 46%;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #17191c;
      color: var(--accent-2);
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .winner-board {
      display: grid;
      align-content: center;
      justify-items: center;
      min-height: 0;
      overflow: auto;
      padding: 26px 0;
      text-align: center;
    }

    .winner-number {
      color: var(--accent);
      font-size: clamp(34px, 5.5vw, 96px);
      font-weight: 900;
      line-height: 1;
      text-shadow: var(--shadow);
    }

    .winner-name {
      max-width: 100%;
      margin-top: 16px;
      font-size: clamp(80px, 12vw, 190px);
      font-weight: 950;
      letter-spacing: 0;
      line-height: 1.03;
      overflow-wrap: anywhere;
      text-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      word-break: keep-all;
    }

    .winner-korean {
      max-width: 100%;
      margin-top: 16px;
      color: var(--accent);
      font-size: clamp(28px, 4.2vw, 72px);
      font-weight: 850;
      line-height: 1.12;
      overflow-wrap: anywhere;
      word-break: keep-all;
    }

    .winner-meta {
      max-width: min(760px, 100%);
      margin-top: 24px;
      color: var(--muted);
      font-size: clamp(18px, 2.2vw, 30px);
      font-weight: 750;
      line-height: 1.3;
    }

    .winner-board.is-spinning .winner-number,
    .winner-board.is-spinning .winner-name,
    .winner-board.is-spinning .winner-korean {
      color: #ffffff;
      transform: scale(1.015);
      transition: transform 70ms ease;
    }

    .winner-set {
      display: grid;
      width: min(1180px, 100%);
      gap: 18px;
    }

    .winner-set.is-batch {
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      align-items: stretch;
    }

    .winner-set.is-large-batch {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .winner-card {
      display: grid;
      align-content: center;
      justify-items: center;
      min-height: 210px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(20, 22, 25, 0.72);
      padding: 18px;
      text-align: center;
    }

    .winner-set.is-single .winner-card {
      border: 0;
      background: transparent;
      min-height: 0;
      padding: 0;
    }

    html[lang="ja"] .winner-set.is-single .winner-name,
    html[lang="ja"] .winner-board > .winner-card .winner-name {
      font-size: clamp(64px, 9vw, 148px);
    }

    .winner-set.is-batch .winner-number {
      font-size: clamp(22px, 2.6vw, 42px);
    }

    .winner-set.is-batch .winner-name {
      margin-top: 10px;
      font-size: clamp(34px, 4.1vw, 70px);
    }

    .winner-set.is-batch .winner-korean {
      margin-top: 10px;
      font-size: clamp(22px, 2.8vw, 40px);
    }

    .winner-set.is-batch .winner-meta {
      margin-top: 12px;
      font-size: clamp(14px, 1.4vw, 20px);
    }

    .winner-set.is-large-batch .winner-card {
      min-height: 150px;
      padding: 12px;
    }

    .winner-set.is-large-batch .winner-number {
      font-size: clamp(16px, 1.8vw, 28px);
    }

    .winner-set.is-large-batch .winner-name {
      font-size: clamp(24px, 2.5vw, 42px);
    }

    .winner-set.is-large-batch .winner-korean {
      font-size: clamp(16px, 1.8vw, 28px);
    }

    .winner-set.is-large-batch .winner-meta {
      font-size: clamp(12px, 1.2vw, 16px);
    }

    .absent-current-button {
      min-height: 36px;
      margin-top: 16px;
      border-radius: 8px;
      background: #3a2427;
      color: #ffd7d7;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 850;
    }

    .big-draw {
      width: min(760px, 100%);
      min-height: 72px;
      justify-self: center;
      font-size: clamp(22px, 3vw, 40px);
      letter-spacing: 0;
    }

    .history-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .history-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .history-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .history-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .absent-section {
      margin-top: 26px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    .history-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141619;
      padding: 10px 12px;
    }

    .history-order {
      color: var(--accent);
      font-weight: 900;
    }

    .history-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .history-extra {
      grid-column: 2;
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-history {
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 1080px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100%;
      }

      .setup,
      .history {
        border-width: 0 0 1px 0;
      }

      .stage {
        min-height: 74vh;
      }

      .history {
        border-width: 1px 0 0;
      }
    }

    @media (max-width: 640px) {
      .setup,
      .history,
      .stage {
        padding: 18px;
      }

      .stage-header {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        max-width: 100%;
      }

      .winner-name {
        font-size: clamp(58px, 18vw, 116px);
      }

      .winner-set.is-batch {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="setup" aria-label="추첨 설정" data-i18n-aria="setupAria">
      <h1 class="brand">
        <span class="brand-title">Raffle Draw</span>
        <span class="brand-subtitle" data-i18n="brandSubtitle">CSV 또는 XLSX 명단을 불러온 뒤 Enter를 눌러 당첨자를 추첨하세요.</span>
      </h1>

      <span class="field-label" data-i18n="languageLabel">언어</span>
      <div class="language-switch" role="group" aria-label="언어 선택" data-i18n-aria="languageAria">
        <button class="language-button is-active" type="button" data-language="ko" aria-pressed="true">KOR 한국어</button>
        <button class="language-button" type="button" data-language="ja" aria-pressed="false">JPN 日本語</button>
      </div>

      <label class="field-label" for="eventTitleInput" data-i18n="screenTitleLabel">화면 제목</label>
      <input class="title-input" id="eventTitleInput" type="text" value="오늘의 추첨" autocomplete="off">

      <label class="field-label" for="csvFile" data-i18n="participantFileLabel">참가자 명단</label>
      <input class="file-input" id="csvFile" type="file" accept=".csv,.xlsx,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
      <label class="drop-zone" id="dropZone" for="csvFile">
        <span>
          <strong data-i18n="selectFile">CSV 또는 XLSX 파일 선택</strong>
          <span data-i18n="fileExample">예: 1,양민규</span><br>
          <span data-i18n="fileHelp">번호와 이름이 있는 명단을 사용하세요.</span>
        </span>
      </label>

      <div class="stats" aria-live="polite">
        <div class="stat">
          <span class="stat-label" data-i18n="totalLabel">전체</span>
          <span class="stat-value" id="totalCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label" data-i18n="remainingLabel">남은 인원</span>
          <span class="stat-value" id="remainingCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label" data-i18n="winnersLabel">당첨</span>
          <span class="stat-value" id="winnerCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label" data-i18n="absentLabel">불참</span>
          <span class="stat-value" id="absentCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label" data-i18n="fileLabel">파일</span>
          <span class="stat-value" id="fileState">-</span>
        </div>
      </div>

      <label class="field-label" data-i18n="winnersPerDrawLabel">한 번에 추첨할 인원</label>
      <div class="draw-count-control" role="group" aria-label="한 번에 추첨할 인원" data-i18n-aria="winnersPerDrawAria">
        <button class="step-button" id="drawCountMinus" type="button" aria-label="추첨 인원 줄이기" data-i18n-aria="decreaseDrawCountAria">-</button>
        <input class="draw-count-input" id="drawCountInput" type="number" min="1" max="50" step="1" value="1" inputmode="numeric" aria-label="한 번에 추첨할 인원" data-i18n-aria="winnersPerDrawAria">
        <button class="step-button" id="drawCountPlus" type="button" aria-label="추첨 인원 늘리기" data-i18n-aria="increaseDrawCountAria">+</button>
      </div>

      <div class="actions">
        <button class="action-button primary" id="drawButton" type="button">당첨자 추첨</button>
        <button class="action-button" id="absentButton" type="button" data-i18n="markAbsentButton">현재 당첨자 불참 처리</button>
        <button class="action-button" id="restoreAbsentButton" type="button" data-i18n="restoreAbsentButton">최근 불참 되돌리기</button>
        <button class="action-button" id="fullscreenButton" type="button" data-i18n="fullscreenButton">전체 화면</button>
        <button class="action-button" id="undoButton" type="button" data-i18n="undoButton">최근 당첨 취소</button>
        <button class="action-button" id="exportButton" type="button" data-i18n="exportButton">결과 CSV 저장</button>
        <button class="action-button danger" id="resetButton" type="button" data-i18n="resetButton">추첨 다시 시작</button>
      </div>

      <p class="hint" data-i18n="hint">명단을 불러온 뒤 Enter 또는 Space를 누르세요. 정확한 영문 표기를 위해 English Name 열을 추가하는 것을 권장합니다. 없으면 한글 이름을 자동 변환합니다.</p>
    </aside>

    <main class="stage" aria-label="추첨 무대" data-i18n-aria="stageAria">
      <header class="stage-header">
        <div class="event-title" id="eventTitleDisplay">오늘의 추첨</div>
        <div class="status" id="statusMessage">명단을 불러오세요</div>
      </header>

      <section class="winner-board" id="winnerBoard" aria-live="polite" aria-atomic="true">
        <div class="winner-number" id="winnerNumber">No.</div>
        <div class="winner-name" id="winnerName">준비 완료</div>
        <div class="winner-korean" id="winnerKorean">이름이 여기에 표시됩니다</div>
        <div class="winner-meta" id="winnerMeta">형식: 번호, 이름, 선택 영문 이름</div>
      </section>

      <button class="big-draw" id="bigDrawButton" type="button">Enter를 누르거나 클릭하여 추첨</button>
    </main>

    <aside class="history" aria-label="당첨자 기록" data-i18n-aria="historyAria">
      <div class="history-header">
        <h2 class="history-title" data-i18n="winnerHistoryTitle">당첨자 기록</h2>
        <span class="history-count" id="historyCount">0</span>
      </div>
      <ol class="history-list" id="historyList"></ol>

      <div class="absent-section">
        <div class="history-header">
          <h2 class="history-title" data-i18n="absentHistoryTitle">불참</h2>
          <span class="history-count" id="absenteeCount">0</span>
        </div>
        <ol class="history-list" id="absenteeList"></ol>
      </div>
    </aside>
  </div>

  <script>
    const STORAGE_KEY = "raffle-draw-state-v1";
    const DRAW_DURATION_MS = 500;
    const MIN_DRAW_COUNT = 1;
    const MAX_DRAW_COUNT = 50;
    const SUPPORTED_LANGUAGES = new Set(["ko", "ja"]);
    const LANGUAGE_LOCALES = {
      ko: "ko-KR",
      ja: "ja-JP"
    };

    const TRANSLATIONS = {
      ko: {
        documentTitle: "행운권 추첨",
        defaultTitle: "오늘의 추첨",
        brandSubtitle: "CSV 또는 XLSX 명단을 불러온 뒤 Enter를 눌러 당첨자를 추첨하세요.",
        languageLabel: "언어",
        languageAria: "언어 선택",
        setupAria: "추첨 설정",
        screenTitleLabel: "화면 제목",
        participantFileLabel: "참가자 명단",
        selectFile: "CSV 또는 XLSX 파일 선택",
        fileExample: "예: 1,양민규",
        fileHelp: "번호와 이름이 있는 명단을 사용하세요.",
        totalLabel: "전체",
        remainingLabel: "남은 인원",
        winnersLabel: "당첨",
        absentLabel: "불참",
        fileLabel: "파일",
        winnersPerDrawLabel: "한 번에 추첨할 인원",

    function t(key, values = {}) {
      const language = SUPPORTED_LANGUAGES.has(state.language) ? state.language : "ko";
      const template = TRANSLATIONS[language][key] ?? TRANSLATIONS.ko[key] ?? key;
      return Object.entries(values).reduce((text, [name, value]) => {
        return text.replaceAll(`{${name}}`, String(value));
      }, template);
    }

    function formatCount(value) {
      const locale = LANGUAGE_LOCALES[state.language] || LANGUAGE_LOCALES.ko;
      return Number(value).toLocaleString(locale);
    }

    function applyTranslations() {
      document.documentElement.lang = state.language;
      document.title = t("documentTitle");

      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.dataset?.i18n;
        if (key) {
          node.textContent = t(key);
        }
      });

      document.querySelectorAll("[data-i18n-aria]").forEach((node) => {
        const key = node.dataset?.i18nAria;
        if (key) {
          node.setAttribute("aria-label", t(key));
        }
      });

      elements.languageButtons.forEach((button) => {
        const isActive = button.dataset.language === state.language;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
    }

    function isDefaultTitle(title) {
      const cleanTitle = cleanCell(title);
      return !cleanTitle || cleanTitle === "Raffle Draw" || Object.values(TRANSLATIONS).some((messages) => cleanTitle === messages.defaultTitle);
    }

    function setLanguage(language) {
      if (!SUPPORTED_LANGUAGES.has(language) || language === state.language || state.spinning) {
        return;
      }

      const useTranslatedDefaultTitle = isDefaultTitle(state.title);
      state.language = language;

      if (useTranslatedDefaultTitle) {
        state.title = t("defaultTitle");
      }

      applyTranslations();
      saveState();
      render();
      setStatus(t("statusLanguageChanged"));
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (char === "\"") {
          if (inQuotes && next === "\"") {
            cell += "\"";
            index += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") {
            index += 1;
          }
          row.push(cell);
          pushCsvRow(rows, row);
          row = [];
          cell = "";
          continue;
        }

        cell += char;
      }

      row.push(cell);
      pushCsvRow(rows, row);
      return rows;
    }

    function pushCsvRow(rows, row) {
      const cleaned = row.map((value) => value.replace(/^\uFEFF/, "").trim());
      const hasValue = cleaned.some((value) => value.length > 0);
      if (hasValue) {
        rows.push(cleaned);
      }
    }

    function looksLikeHeader(row) {
      const normalizedCells = row.map((cell) => cleanCell(cell).normalize("NFKC").toLowerCase());
      const text = normalizedCells.join(" ");
      const hasNumber = /순번|번호|추첨|행운권|抽選|くじ|整理番号|受付番号|応募番号|エントリー番号|no\.?|number|ticket|raffle|draw|index|id|idx/.test(text);
      const hasName = /이름|성명|氏名|姓名|名前|お名前|参加者名|応募者名|申込者名|korean\s*name|japanese\s*name|name/.test(text);
      const hasExactNameHeader = normalizedCells.some((cell) => /^(name|full\s*name|korean\s*name|japanese\s*name|이름|성명|氏名(?:\((漢字|日本語)\))?|姓名|名前(?:\((漢字|日本語)\))?|お名前|参加者名|応募者名|申込者名|漢字氏名|氏名漢字|日本語氏名)$/.test(cell));
      const hasReadingOrDetails = /영문|로마자|발음|ローマ字|英字|ふりがな|フリガナ|よみがな|読み|소속|부서|회사|所属|部署|部門|会社|affiliation|department|company/.test(text);
      return hasExactNameHeader || (hasName && (hasNumber || hasReadingOrDetails));
    }

    function normalizeParticipants(rows) {
      const hasHeader = rows.length > 0 && looksLikeHeader(rows[0]);
      const headerInfo = hasHeader ? getHeaderInfo(rows[0]) : null;
      const dataRows = hasHeader ? rows.slice(1) : rows;
      const participants = [];

      dataRows.forEach((row, index) => {
        const first = cleanCell(row[0]);
        const second = cleanCell(row[1]);
        let number = row.length >= 2 ? first : String(index + 1);
        let name = row.length >= 2 ? second : first;
        let providedEnglishName = "";
        let providedReading = "";
        let extra = "";

        if (hasHeader) {
          number = cleanCell(row[headerInfo.numberIndex]) || String(index + 1);
          name = cleanCell(row[headerInfo.nameIndex]);
          providedEnglishName = headerInfo.englishNameIndex >= 0 ? cleanCell(row[headerInfo.englishNameIndex]) : "";
          providedReading = headerInfo.readingIndex >= 0 ? cleanCell(row[headerInfo.readingIndex]) : "";
          extra = row
            .filter((_, columnIndex) => !headerInfo.usedIndexes.has(columnIndex))
            .map(cleanCell)
            .filter(Boolean)
            .join(" / ");
        } else if (row.length >= 3 && isLikelyManualEnglishName(row[2])) {
          providedEnglishName = cleanCell(row[2]);
          extra = row.slice(3).map(cleanCell).filter(Boolean).join(" / ");
        } else if (row.length >= 3 && isLikelyJapaneseReading(row[2])) {
          providedReading = cleanCell(row[2]);
          extra = row.slice(3).map(cleanCell).filter(Boolean).join(" / ");
        } else {
          extra = row.slice(2).map(cleanCell).filter(Boolean).join(" / ");
        }

        if (!name) {
          return;
        }

        const englishName = providedEnglishName || romanizeParticipantName(name, providedReading);

        participants.push({
          id: `${index + 1}-${number}-${name}`,
          number: number || String(index + 1),
          name,
          englishName,
          englishNameSource: getNameSource(name, providedEnglishName, providedReading),
          reading: providedReading,
          extra
        });
      });

      return participants;
    }

    function getHeaderInfo(header) {
      const normalized = header.map((cell) => cleanCell(cell).normalize("NFKC").toLowerCase());
      const raffleNumberIndex = findHeaderIndex(normalized, [
        /행운권.*(번호|no)/,
        /추첨.*(번호|no)/,
        /抽選.*(番号|no)/,
        /くじ.*(番号|no)/,
        /ラッフル/,
        /チケット.*(番号|no)/,
        /raffle/,
        /ticket/,
        /draw\s*(no|number)/
      ], -1);
      const numberIndex = raffleNumberIndex >= 0 ? raffleNumberIndex : findHeaderIndex(normalized, [
        /^(no|no\.|number|id|idx|index|participant\s*no|participant\s*id|순번|번호|連番|通し番号|整理番号|受付番号|参加者番号|応募番号|エントリー番号|管理番号)$/
      ], -1);
      const englishNameIndex = findHeaderIndex(normalized, [
        /english\s*name/,
        /英語.*(名|氏名)/,
        /英字.*(名|氏名|表記)/,
        /英文氏名/,
        /ローマ字/,
        /アルファベット.*(氏名|表記)/,
        /romaji/,
        /latin\s*name/,
        /roman/,
        /pronunciation/,
        /영문/,
        /로마자/,
        /발음/
      ], -1);
      const readingIndex = findHeaderIndex(normalized, [
        /ふりがな/,
        /フリガナ/,
        /よみがな/,
        /ヨミガナ/,
        /読み(方|仮名)?/,
        /氏名.*(かな|カナ)/,
        /^(かな|カナ|reading)$/
      ], -1, new Set([englishNameIndex]));
      const nameIndex = findHeaderIndex(normalized, [
        /korean\s*name/,
        /japanese\s*name/,
        /participant\s*name/,
        /参加者.*(氏名|名前)/,
        /^(name|full\s*name|이름|성명|氏名(?:\((漢字|日本語)\))?|姓名|名前(?:\((漢字|日本語)\))?|お名前|参加者名|応募者名|申込者名|漢字氏名|氏名漢字|日本語氏名)$/
      ], numberIndex === 0 ? 1 : 0, new Set([englishNameIndex, readingIndex]));
      const usedIndexes = new Set([numberIndex, nameIndex]);

      if (englishNameIndex >= 0) {
        usedIndexes.add(englishNameIndex);
      }

      if (readingIndex >= 0) {
        usedIndexes.add(readingIndex);
      }

      return {
        numberIndex,
        nameIndex,
        englishNameIndex,
        readingIndex,
        usedIndexes
      };
    }

    function findHeaderIndex(normalizedHeader, patterns, fallback, excludedIndexes = new Set()) {
      const index = normalizedHeader.findIndex((cell, columnIndex) => {
        if (excludedIndexes.has(columnIndex)) {
          return false;
        }
        return patterns.some((pattern) => pattern.test(cell));
      });

      return index >= 0 ? index : fallback;
    }

    function cleanCell(value) {
      return String(value ?? "").trim();
    }

    function isLikelyManualEnglishName(value) {
      const text = cleanCell(value);
      return /^[A-Za-z][A-Za-z .'-]+$/.test(text) && /[\s-]/.test(text);
    }

    function isLikelyJapaneseReading(value) {
      const text = cleanCell(value).normalize("NFKC");
      return text.length > 0 && /^[\u3040-\u30ff\u31f0-\u31ffー・\s]+$/.test(text);
    }

    function getNameSource(name, providedEnglishName, providedReading) {
      if (providedEnglishName) {
        return "provided";
      }

      if (providedReading) {
        return "kana";
      }

      const cleanName = cleanCell(name);
      if (Array.from(cleanName).some(isHangulSyllable) || isLikelyJapaneseReading(cleanName)) {
        return "auto";
      }

      return "original";
    }

    function romanizeKoreanName(name) {
      const cleaned = cleanCell(name).replace(/\s+/g, "");
      const hangulChars = Array.from(cleaned).filter(isHangulSyllable);

      if (hangulChars.length === 0) {
        return cleanCell(name) || "Unknown";
      }

      if (hangulChars.length === 1) {
        return capitalize(romanizeHangulSyllable(hangulChars[0]));
      }

      const surname = SURNAME_ROMANIZATION.get(hangulChars[0]) || capitalize(romanizeHangulSyllable(hangulChars[0]));
      const givenName = hangulChars
        .slice(1)
        .map((char, index) => {
          const romanized = romanizeHangulSyllable(char);
          return index === 0 ? capitalize(romanized) : romanized;
        })
        .join("-");
      return `${surname} ${givenName}`;
    }

    function isHangulSyllable(char) {
      const code = char.charCodeAt(0);
      return code >= HANGUL_START && code <= HANGUL_END;
    }

    function romanizeHangulSyllable(char) {
      const offset = char.charCodeAt(0) - HANGUL_START;
      const initialIndex = Math.floor(offset / HANGUL_BASE);
      const vowelIndex = Math.floor((offset % HANGUL_BASE) / VOWEL_BASE);
      const finalIndex = offset % VOWEL_BASE;
      return `${INITIALS[initialIndex]}${VOWELS[vowelIndex]}${FINALS[finalIndex]}`;
    }

    function capitalize(text) {
      return text ? `${text[0].toUpperCase()}${text.slice(1)}` : "";
    }

    function containsJapaneseKana(value) {
      return /[\u3040-\u30ff\u31f0-\u31ffー]/.test(cleanCell(value).normalize("NFKC"));
    }

    function katakanaToHiragana(value) {
      return Array.from(cleanCell(value).normalize("NFKC")).map((char) => {
        const code = char.charCodeAt(0);
        return code >= 0x30a1 && code <= 0x30f6 ? String.fromCharCode(code - 0x60) : char;
      }).join("");
    }

    function getKanaSyllable(text, index) {
      const pair = text.slice(index, index + 2);
      if (KANA_ROMAJI[pair]) {
        return { value: KANA_ROMAJI[pair], length: 2 };
      }

      const single = KANA_ROMAJI[text[index]];
      return single ? { value: single, length: 1 } : null;
    }

    function romanizeJapaneseKana(value) {
      const text = katakanaToHiragana(value);
      if (!/^[\u3040-\u309fー・\s]+$/.test(text)) {
        return cleanCell(value);
      }

      let result = "";
      let geminateNext = false;

      for (let index = 0; index < text.length;) {
        const char = text[index];

        if (/\s/.test(char) || char === "・") {
          result += " ";
          geminateNext = false;
          index += 1;
          continue;
        }

        if (char === "っ") {
          geminateNext = true;
          index += 1;
          continue;
        }

        if (char === "ー") {
          const lastVowel = result.match(/[aeiou](?!.*[aeiou])/i)?.[0] || "";
          result += lastVowel.toLowerCase();
          index += 1;
          continue;
        }

        const syllable = getKanaSyllable(text, index);

        if (!syllable) {
          result += char;
          geminateNext = false;
          index += 1;
          continue;
        }

        let romanized = syllable.value;

        if (char === "ん") {
          const next = getKanaSyllable(text, index + syllable.length)?.value || "";
          romanized = /^[aeiouy]/.test(next) ? "n'" : "n";
        }

        if (geminateNext) {
          const prefix = romanized.startsWith("ch") ? "t" : romanized.match(/^[bcdfghjklmnpqrstvwxyz]/)?.[0] || "";
          romanized = `${prefix}${romanized}`;
          geminateNext = false;
        }

        result += romanized;
        index += syllable.length;
      }

      return result
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .map(capitalize)
        .join(" ");
    }

    function romanizeParticipantName(name, reading = "") {
      const cleanName = cleanCell(name);
      const cleanReading = cleanCell(reading);

      if (cleanReading) {
        return containsJapaneseKana(cleanReading) ? romanizeJapaneseKana(cleanReading) : cleanReading;
      }

      if (Array.from(cleanName).some(isHangulSyllable)) {
        return romanizeKoreanName(cleanName);
      }

      if (containsJapaneseKana(cleanName) && /^[\u3040-\u30ff\u31f0-\u31ffー・\s]+$/.test(cleanName.normalize("NFKC"))) {
        return romanizeJapaneseKana(cleanName);
      }

      return cleanName || "Unknown";
    }

    async function readCsvFile(file) {
      const buffer = await file.arrayBuffer();
      try {
        return new TextDecoder("utf-8", { fatal: true }).decode(buffer);
      } catch (utf8Error) {
        const fallbackEncodings = state.language === "ja" ? ["shift_jis", "euc-kr"] : ["euc-kr", "shift_jis"];
        const candidates = [];

        for (const encoding of fallbackEncodings) {
          try {
            const text = new TextDecoder(encoding, { fatal: true }).decode(buffer);
            candidates.push({ encoding, text, score: scoreDecodedCsv(text, encoding) });
          } catch {
            // Trying both legacy encodings is expected; invalid candidates are ignored.
          }
        }

        if (candidates.length > 0) {
          candidates.sort((left, right) => right.score - left.score);
          return candidates[0].text;
        }

        return new TextDecoder("utf-8").decode(buffer);
      }
    }

    function scoreDecodedCsv(text, encoding) {
      const normalized = cleanCell(text).normalize("NFKC");
      const koreanHeaders = normalized.match(/번호|순번|추첨|행운권|이름|성명|소속|영문|로마자/g)?.length || 0;
      const japaneseHeaders = normalized.match(/番号|抽選|くじ|氏名|名前|所属|ローマ字|フリガナ|ふりがな|よみがな/g)?.length || 0;
      const hangulCount = normalized.match(/[가-힣]/g)?.length || 0;
      const kanaCount = normalized.match(/[\u3040-\u30ff]/g)?.length || 0;
      const controlCount = normalized.match(/[\u0000-\u0008\u000b\u000c\u000e-\u001f]/g)?.length || 0;
      let score = (koreanHeaders + japaneseHeaders) * 30 + (hangulCount + kanaCount) * 0.5 - controlCount * 20;

      if (state.language === "ja") {
        score += japaneseHeaders * 20 + kanaCount * 0.25 + (encoding === "shift_jis" ? 1 : 0);
      } else {
        score += koreanHeaders * 20 + hangulCount * 0.25 + (encoding === "euc-kr" ? 1 : 0);
      }

      return score;
    }

    async function readParticipantRows(file) {
      const lowerName = file.name.toLowerCase();

      if (lowerName.endsWith(".xlsx") || file.type === "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet") {
        return readXlsxRows(await file.arrayBuffer());
      }

      if (lowerName.endsWith(".xls")) {
        throw new Error(t("errorLegacyXls"));
      }

      return parseCsv(await readCsvFile(file));
    }

    async function readXlsxRows(buffer) {
      const entries = parseZipEntries(buffer);
      const sharedStringsEntry = entries.get("xl/sharedStrings.xml");
      const worksheetName = getFirstWorksheetName(entries);

      if (!worksheetName) {
        throw new Error(t("errorNoWorksheet"));
      }

      const sharedStrings = sharedStringsEntry
        ? parseSharedStrings(await readZipText(buffer, sharedStringsEntry))
        : [];
      const worksheetXml = await readZipText(buffer, entries.get(worksheetName));
      return parseWorksheetRows(worksheetXml, sharedStrings);
    }

    function parseZipEntries(buffer) {
      const view = new DataView(buffer);
      const endOffset = findEndOfCentralDirectory(view);
      const entryCount = view.getUint16(endOffset + 10, true);
      let offset = view.getUint32(endOffset + 16, true);
      const entries = new Map();

      for (let index = 0; index < entryCount; index += 1) {
        if (view.getUint32(offset, true) !== 0x02014b50) {
          throw new Error(t("errorInvalidXlsx"));
        }

        const method = view.getUint16(offset + 10, true);
        const compressedSize = view.getUint32(offset + 20, true);
        const fileNameLength = view.getUint16(offset + 28, true);
        const extraLength = view.getUint16(offset + 30, true);
        const commentLength = view.getUint16(offset + 32, true);
        const localHeaderOffset = view.getUint32(offset + 42, true);
        const fileName = new TextDecoder("utf-8").decode(new Uint8Array(buffer, offset + 46, fileNameLength));

        if (view.getUint32(localHeaderOffset, true) !== 0x04034b50) {
          throw new Error(t("errorInvalidXlsx"));
        }

        const localFileNameLength = view.getUint16(localHeaderOffset + 26, true);
        const localExtraLength = view.getUint16(localHeaderOffset + 28, true);
        const dataOffset = localHeaderOffset + 30 + localFileNameLength + localExtraLength;

        entries.set(fileName, {
          method,
          compressedSize,
          dataOffset
        });

        offset += 46 + fileNameLength + extraLength + commentLength;
      }

      return entries;
    }

    function findEndOfCentralDirectory(view) {
      const minimumOffset = Math.max(0, view.byteLength - 0xffff - 22);

      for (let offset = view.byteLength - 22; offset >= minimumOffset; offset -= 1) {
        if (view.getUint32(offset, true) === 0x06054b50) {
          return offset;
        }
      }

      throw new Error(t("errorInvalidXlsx"));
    }

    function getFirstWorksheetName(entries) {
      return [...entries.keys()]
        .filter((name) => /^xl\/worksheets\/sheet\d+\.xml$/.test(name))
        .sort((left, right) => {
          const leftNumber = Number(left.match(/sheet(\d+)\.xml$/)?.[1] || 0);
          const rightNumber = Number(right.match(/sheet(\d+)\.xml$/)?.[1] || 0);
          return leftNumber - rightNumber;
        })[0];
    }

    async function readZipText(buffer, entry) {
      const bytes = await readZipEntry(buffer, entry);
      return new TextDecoder("utf-8").decode(bytes);
    }

    async function readZipEntry(buffer, entry) {
      const compressed = buffer.slice(entry.dataOffset, entry.dataOffset + entry.compressedSize);

      if (entry.method === 0) {
        return compressed;
      }

      if (entry.method !== 8) {
        throw new Error(t("errorUnsupportedCompression"));
      }

      return inflateRaw(compressed);
    }

    async function inflateRaw(buffer) {
      if (typeof DecompressionStream === "undefined") {
        throw new Error(t("errorNoDecompressor"));
      }

      try {
        return await decompress(buffer, "deflate-raw");
      } catch (error) {
        return decompress(buffer, "deflate");
      }
    }

    async function decompress(buffer, format) {
      const stream = new Blob([buffer]).stream().pipeThrough(new DecompressionStream(format));
      return new Response(stream).arrayBuffer();
    }

    function parseSharedStrings(xml) {
      const strings = [];
      const stringRegex = /<si\b[^>]*>([\s\S]*?)<\/si>/g;
      let match;

      while ((match = stringRegex.exec(xml))) {
        strings.push(readInlineString(match[1]));
      }

      return strings;
    }

    function parseWorksheetRows(xml, sharedStrings) {
      const rows = [];
      const rowRegex = /<row\b[^>]*>([\s\S]*?)<\/row>/g;
      let rowMatch;

      while ((rowMatch = rowRegex.exec(xml))) {
        const row = [];
        const cellRegex = /<c\b([^>]*)\/>|<c\b([^>]*)>([\s\S]*?)<\/c>/g;
        let cellMatch;

        while ((cellMatch = cellRegex.exec(rowMatch[1]))) {
          const attributes = cellMatch[1] || cellMatch[2] || "";
          const body = cellMatch[3] || "";
          const reference = getXmlAttribute(attributes, "r");
          const columnIndex = reference ? getColumnIndex(reference) : row.length;
          row[columnIndex] = readCellValue(attributes, body, sharedStrings);
        }

        const cleaned = row.map((value) => cleanCell(value));
        if (cleaned.some(Boolean)) {
          rows.push(cleaned);
        }
      }

      return rows;
    }

    function readCellValue(attributes, body, sharedStrings) {
      const type = getXmlAttribute(attributes, "t");

      if (type === "inlineStr") {
        return readInlineString(body);
      }

      const value = readXmlTag(body, "v");

      if (type === "s") {
        return sharedStrings[Number.parseInt(value, 10)] || "";
      }

      return unescapeXml(value);
    }

    function readInlineString(xml) {
      const pieces = [];
      const textRegex = /<t\b[^>]*>([\s\S]*?)<\/t>/g;
      let match;

      while ((match = textRegex.exec(xml))) {
        pieces.push(unescapeXml(match[1]));
      }

      return pieces.join("");
    }

    function readXmlTag(xml, tagName) {
      const match = new RegExp(`<${tagName}\\b[^>]*>([\\s\\S]*?)<\\/${tagName}>`).exec(xml);
      return match ? match[1] : "";
    }

    function getXmlAttribute(text, name) {
      const match = new RegExp(`${name}="([^"]*)"`).exec(text);
      return match ? unescapeXml(match[1]) : "";
    }

    function getColumnIndex(reference) {
      const letters = reference.match(/^[A-Z]+/i)?.[0] || "A";
      return Array.from(letters.toUpperCase()).reduce((total, letter) => {
        return total * 26 + letter.charCodeAt(0) - 64;
      }, 0) - 1;
    }

    function unescapeXml(text) {
      return String(text ?? "")
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">")
        .replace(/&quot;/g, "\"")
        .replace(/&apos;/g, "'")
        .replace(/&amp;/g, "&");
    }

    async function loadFile(file) {
      if (!file) {
        return;
      }

      try {
        setStatus(t("statusReadingFile"));
        const participants = normalizeParticipants(await readParticipantRows(file));

        if (participants.length === 0) {
          setStatus(t("statusNoNames"));
          return;
        }

        state.sourceName = file.name;
        state.participants = participants;
        state.remaining = participants.slice();
        state.winners = [];
        state.absentees = [];
        state.currentBatch = [];
        state.current = null;
        state.pendingReplacementCount = 0;

        saveState();
        render();
        setStatus(t("statusParticipantsLoaded", { count: formatCount(participants.length) }));
      } catch (error) {
        console.error(error);
        setStatus(error.message || t("statusCouldNotLoad"));
      }
    }

    function drawWinner() {
      if (state.spinning) {
        return;
      }

      if (state.remaining.length === 0) {
        setStatus(state.participants.length === 0 ? t("statusLoadFirst") : t("statusAllDrawn"));
        return;
      }

      state.spinning = true;
      elements.winnerBoard.classList.add("is-spinning");
      setControlsDisabled(true);
      setStatus(t("statusDrawing"));

      const startedAt = Date.now();
      const duration = DRAW_DURATION_MS;
      const drawCount = getNextDrawCount();
      const shuffleTimer = window.setInterval(() => {
        displayWinnerBatch(getPreviewBatch(drawCount), t("previewDrawing"));
      }, 64);

      window.setTimeout(() => {
        window.clearInterval(shuffleTimer);
        const winners = recordRandomWinners(drawCount);
        const elapsed = Date.now() - startedAt;
        state.spinning = false;

        displayWinnerBatch(getActiveCurrentBatch(), getWinnerBatchMeta(winners));
        elements.winnerBoard.classList.remove("is-spinning");
        setControlsDisabled(false);
        setStatus(getDrawCompleteStatus(winners));
        saveState();
        renderCountsAndHistory();
      }, duration);
    }

    function recordWinnerFromIndex(winnerIndex, drawnAt = new Date().toISOString()) {
      return recordWinnersFromIndexes([winnerIndex], drawnAt)[0];
    }

    function recordWinnersFromIndexes(winnerIndexes, drawnAt = new Date().toISOString()) {
      const replacementDraw = state.pendingReplacementCount > 0 && state.currentBatch.length > 0;
      const winners = winnerIndexes.map((winnerIndex) => recordSingleWinnerFromIndex(winnerIndex, drawnAt));
      finishRecordedBatch(winners, replacementDraw);
      return winners;
    }

    function recordRandomWinners(count, drawnAt = new Date().toISOString()) {
      const replacementDraw = state.pendingReplacementCount > 0 && state.currentBatch.length > 0;
      const winners = [];

      for (let index = 0; index < count && state.remaining.length > 0; index += 1) {
        winners.push(recordSingleWinnerFromIndex(secureRandomIndex(state.remaining.length), drawnAt));
      }

      finishRecordedBatch(winners, replacementDraw);
      return winners;
    }

    function recordSingleWinnerFromIndex(winnerIndex, drawnAt) {
      if (winnerIndex < 0 || winnerIndex >= state.remaining.length) {
        throw new Error(t("errorWinnerIndex"));
      }

      const winner = state.remaining.splice(winnerIndex, 1)[0];
      const recordedWinner = {
        ...winner,
        drawnAt,
        drawOrder: state.winners.length + 1
      };

      state.winners.push(recordedWinner);
      return recordedWinner;
    }

    function finishRecordedBatch(winners, appendToCurrentBatch) {
      const nextBatch = appendToCurrentBatch ? [...state.currentBatch, ...winners] : winners;
      state.currentBatch = nextBatch;
      state.current = nextBatch.length > 0 ? nextBatch[nextBatch.length - 1] : null;

      if (state.pendingReplacementCount > 0) {
        state.pendingReplacementCount = Math.max(0, state.pendingReplacementCount - winners.length);
      }
    }

    function getNextDrawCount() {
      const target = state.pendingReplacementCount > 0 ? state.pendingReplacementCount : state.drawCount;
      return Math.max(1, Math.min(target, state.remaining.length));
    }

    function getPreviewBatch(count) {
      const pool = state.remaining.slice();
      const preview = [];

      for (let index = 0; index < count && pool.length > 0; index += 1) {
        const previewIndex = Math.floor(Math.random() * pool.length);
        preview.push(pool.splice(previewIndex, 1)[0]);
      }

      return preview;
    }

    function getActiveCurrentBatch() {
      if (state.currentBatch.length > 0) {
        return state.currentBatch.filter((winner) => state.winners.some((item) => item.id === winner.id));
      }

      return state.current ? [state.current] : [];
    }

    function getWinnerBatchMeta(winners) {
      if (winners.length === 1) {
        return t("winnerMeta", { order: state.winners.length });
      }

      return t("winnersMeta", { count: winners.length });
    }

    function getDrawCompleteStatus(winners) {
      if (state.pendingReplacementCount > 0) {
        return t("statusReplacementPending", { drawn: winners.length, remaining: state.pendingReplacementCount });
      }

      if (state.remaining.length === 0) {
        return t("statusAllDrawn");
      }

      return winners.length > 1 ? t("statusWinnersConfirmed", { count: winners.length }) : t("statusWinnerConfirmed");
    }

    function secureRandomIndex(max) {
      if (max <= 1) {
        return 0;
      }

      if (!window.crypto || !window.crypto.getRandomValues) {
        return Math.floor(Math.random() * max);
      }

      const bucket = new Uint32Array(1);
      const maxUint = 0xffffffff;
      const limit = Math.floor(maxUint / max) * max;

      do {
        window.crypto.getRandomValues(bucket);
      } while (bucket[0] >= limit);

      return bucket[0] % max;
    }

    function undoLastWinner() {
      if (state.spinning || state.winners.length === 0) {
        return;
      }

      const last = state.winners.pop();
      const participant = state.participants.find((item) => item.id === last.id);

      if (participant) {
        state.remaining.push(participant);
      }

      state.current = state.winners.length > 0 ? state.winners[state.winners.length - 1] : null;
      saveState();
      render();
      setStatus(t("statusLastWinnerUndone"));
    }

    function markCurrentAbsent() {
      if (state.spinning || !state.current) {
        return;
      }

      markWinnerAbsentById(state.current.id);
    }

    function markWinnerAbsentById(winnerId) {
      if (state.spinning || !winnerId) {
        return;
      }

      const winnerIndex = state.winners.findIndex((winner) => winner.id === winnerId);

      if (winnerIndex < 0) {
        setStatus(t("statusNoActiveWinner"));
        return;
      }

      const [absent] = state.winners.splice(winnerIndex, 1);
      renumberWinners();
      state.currentBatch = state.currentBatch.filter((winner) => winner.id !== absent.id);
      state.pendingReplacementCount += 1;
      state.absentees.push({
        ...absent,
        absentOrder: state.absentees.length + 1,
        originalDrawOrder: absent.drawOrder,
        markedAbsentAt: new Date().toISOString()
      });
      state.current = state.currentBatch.length > 0 ? state.currentBatch[state.currentBatch.length - 1] : null;

      saveState();
      render();
      setStatus(t("statusMarkedAbsent", { name: getWinnerEnglishName(absent), count: state.pendingReplacementCount }));
    }

    function restoreLastAbsent() {
      if (state.spinning || state.absentees.length === 0) {
        return;
      }

      const restored = state.absentees.pop();
      renumberAbsentees();
      const participant = state.participants.find((item) => item.id === restored.id);
      const alreadyAvailable = state.remaining.some((item) => item.id === restored.id);
      const alreadyWinner = state.winners.some((item) => item.id === restored.id);

      if (participant && !alreadyAvailable && !alreadyWinner) {
        state.remaining.push(participant);
      }

      state.current = null;
      state.currentBatch = getActiveCurrentBatch();
      state.pendingReplacementCount = Math.max(0, state.pendingReplacementCount - 1);
      saveState();
      render();
      setStatus(t("statusRestoredAbsent", { name: getWinnerEnglishName(restored) }));
    }

    function renumberWinners() {
      state.winners.forEach((winner, index) => {
        winner.drawOrder = index + 1;
      });
    }

    function renumberAbsentees() {
      state.absentees.forEach((absentee, index) => {
        absentee.absentOrder = index + 1;
      });
    }

    function resetDraw() {
      if (state.participants.length === 0 || state.spinning) {
        return;
      }

      const confirmed = window.confirm(t("confirmReset"));
      if (!confirmed) {
        return;
      }

      state.remaining = state.participants.slice();
      state.winners = [];
      state.absentees = [];
      state.currentBatch = [];
      state.current = null;
      state.pendingReplacementCount = 0;
      saveState();
      render();
      setStatus(t("statusRestarted"));
    }

    function exportWinners() {
      if (state.winners.length === 0 && state.absentees.length === 0) {
        setStatus(t("statusNoHistory"));
        return;
      }

      const exportData = getExportData();
      const csv = [exportData.header, ...exportData.rows].map(toCsvLine).join("\n");
      const blob = new Blob(["\uFEFF", csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");

      link.href = url;
      link.download = `raffle-winners-${stamp}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setStatus(t("statusResultsSaved"));
    }

    function getExportData() {
      const header = ["Status", "Order", "No.", "Korean Name", "English Name", "English Name Source", "Extra", "Drawn At", "Marked Absent At"];
      const winnerRows = state.winners.map((winner) => [
        "Winner",
        winner.drawOrder,
        winner.number,
        winner.name,
        getWinnerEnglishName(winner),
        winner.englishNameSource || "auto",
        winner.extra || "",
        winner.drawnAt,
        ""
      ]);
      const absenteeRows = state.absentees.map((absentee) => [
        "Absent",
        absentee.originalDrawOrder || "",
        absentee.number,
        absentee.name,
        getWinnerEnglishName(absentee),
        absentee.englishNameSource || "auto",
        absentee.extra || "",
        absentee.drawnAt || "",
        absentee.markedAbsentAt || ""
      ]);

      return {
        header,
        rows: [...winnerRows, ...absenteeRows]
      };
    }

    function toCsvLine(values) {
      return values.map((value) => {
        const text = String(value ?? "");
        if (/[",\n\r]/.test(text)) {
          return `"${text.replace(/"/g, "\"\"")}"`;
        }
        return text;
      }).join(",");
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }

    function displayWinner(winner, meta) {
      displayWinnerBatch(winner ? [winner] : [], meta);
    }

    function displayWinnerBatch(winners, meta, options = {}) {
      elements.winnerBoard.innerHTML = "";

      if (winners.length === 0) {
        elements.winnerBoard.appendChild(createWinnerCard({
          number: t("numberPlaceholder"),
          englishName: t("cardReady"),
          originalName: t("cardNamePlaceholder"),
          meta: t("cardFormat")
        }));
        return;
      }

      const set = document.createElement("div");
      set.className = `winner-set ${winners.length > 1 ? "is-batch" : "is-single"} ${winners.length > 6 ? "is-large-batch" : ""}`;

      winners.forEach((winner) => {
        set.appendChild(createWinnerCard({
          number: winner.isStatus ? winner.number : t("numberPrefix", { number: winner.number }),
          englishName: getWinnerEnglishName(winner),
          originalName: winner.name,
          meta: winner.isStatus ? winner.extra : (winner.extra ? `${meta} · ${winner.extra}` : meta),
          winnerId: winner.id,
          showAbsentAction: winner.isStatus ? false : (options.showAbsentAction ?? state.winners.some((item) => item.id === winner.id))
        }));
      });

      elements.winnerBoard.appendChild(set);
    }

    function createWinnerCard({ number, englishName, originalName, meta, winnerId, showAbsentAction = false }) {
      const card = document.createElement("article");
      card.className = "winner-card";

      const numberNode = document.createElement("div");
      numberNode.className = "winner-number";
      numberNode.textContent = number;

      const nameNode = document.createElement("div");
      nameNode.className = "winner-name";
      nameNode.textContent = englishName;

      const originalNode = document.createElement("div");
      originalNode.className = "winner-korean";
      originalNode.textContent = originalName;

      const metaNode = document.createElement("div");
      metaNode.className = "winner-meta";
      metaNode.textContent = meta;

      card.append(numberNode, nameNode);
      if (cleanCell(originalName) && cleanCell(originalName) !== cleanCell(englishName)) {
        card.appendChild(originalNode);
      }
      card.appendChild(metaNode);

      if (showAbsentAction && winnerId) {
        const absentButton = document.createElement("button");
        absentButton.className = "absent-current-button";
        absentButton.type = "button";
        absentButton.dataset.absentId = winnerId;
        absentButton.textContent = t("absentCardButton");
        card.appendChild(absentButton);
      }

      return card;
    }

    function getWinnerEnglishName(winner) {
      return winner.englishName || romanizeParticipantName(winner.name, winner.reading);
    }

    function render() {
      elements.eventTitleInput.value = state.title;
      elements.eventTitleDisplay.textContent = state.title || t("defaultTitle");

      const activeBatch = getActiveCurrentBatch();

      if (activeBatch.length > 0) {
        const order = activeBatch.length === 1 ? state.winners.find((winner) => winner.id === activeBatch[0].id)?.drawOrder : null;
        displayWinnerBatch(activeBatch, order ? t("winnerMeta", { order }) : t("currentWinnersMeta"));
      } else if (state.participants.length > 0 && state.remaining.length > 0) {
        displayWinnerBatch([{
          id: "",
          isStatus: true,
          number: t("cardReadyNumber"),
          englishName: state.pendingReplacementCount > 0 ? t("drawReplacementButton", { count: state.pendingReplacementCount }) : t("cardEnter"),
          name: t("cardPressEnter"),
          extra: t("cardPronunciation")
        }], "", { showAbsentAction: false });
      } else if (state.participants.length > 0) {
        displayWinnerBatch([{
          id: "",
          isStatus: true,
          number: t("cardComplete"),
          englishName: t("cardAllDone"),
          name: t("cardNoRemaining"),
          extra: t("cardCompleteSummary", { winners: state.winners.length, absent: state.absentees.length })
        }], "", { showAbsentAction: false });
      } else {
        displayWinner(null);
      }

      renderCountsAndHistory();
    }

    function renderCountsAndHistory() {
      elements.totalCount.textContent = formatCount(state.participants.length);
      elements.remainingCount.textContent = formatCount(state.remaining.length);
      elements.winnerCount.textContent = formatCount(state.winners.length);
      elements.absentCount.textContent = formatCount(state.absentees.length);
      elements.fileState.textContent = state.sourceName ? t("fileLoaded") : "-";
      elements.historyCount.textContent = formatCount(state.winners.length);
      elements.absenteeCount.textContent = formatCount(state.absentees.length);

      const canDraw = state.participants.length > 0 && state.remaining.length > 0 && !state.spinning;
      const activeBatch = getActiveCurrentBatch();
      const canMarkAbsent = activeBatch.length === 1 && Boolean(state.current) && state.winners.some((winner) => winner.id === state.current.id) && !state.spinning;
      elements.drawButton.disabled = !canDraw;
      elements.bigDrawButton.disabled = !canDraw;
      elements.absentButton.disabled = !canMarkAbsent;
      elements.restoreAbsentButton.disabled = state.absentees.length === 0 || state.spinning;
      elements.undoButton.disabled = state.winners.length === 0 || state.spinning;
      elements.resetButton.disabled = state.participants.length === 0 || state.spinning;
      elements.exportButton.disabled = (state.winners.length === 0 && state.absentees.length === 0) || state.spinning;
      elements.drawButton.textContent = getDrawButtonText();
      elements.bigDrawButton.textContent = canDraw ? getBigDrawButtonText() : (state.participants.length === 0 ? t("loadFileButton") : t("noRemainingButton"));
      elements.drawCountInput.value = state.drawCount;
      elements.drawCountInput.disabled = state.spinning;
      elements.drawCountMinus.disabled = state.spinning || state.drawCount <= MIN_DRAW_COUNT;
      elements.drawCountPlus.disabled = state.spinning || state.drawCount >= MAX_DRAW_COUNT;

      elements.historyList.innerHTML = "";
      elements.absenteeList.innerHTML = "";

      if (state.winners.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty-history";
        empty.textContent = t("noWinners");
        elements.historyList.appendChild(empty);
      } else {
        state.winners.slice().reverse().forEach((winner) => {
          const item = document.createElement("li");
          item.className = "history-item";

          const order = document.createElement("span");
          order.className = "history-order";
          order.textContent = `${winner.drawOrder}.`;

          const name = document.createElement("span");
          name.className = "history-name";
          name.textContent = `${winner.number} ${getWinnerEnglishName(winner)}`;

          item.append(order, name);

          if ((winner.name && winner.name !== getWinnerEnglishName(winner)) || winner.extra) {
            const extra = document.createElement("span");
            extra.className = "history-extra";
            extra.textContent = [winner.name !== getWinnerEnglishName(winner) ? winner.name : "", winner.extra].filter(Boolean).join(" · ");
            item.appendChild(extra);
          }

          elements.historyList.appendChild(item);
        });
      }

      if (state.absentees.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty-history";
        empty.textContent = t("noAbsentees");
        elements.absenteeList.appendChild(empty);
        return;
      }

      state.absentees.slice().reverse().forEach((absentee) => {
        const item = document.createElement("li");
        item.className = "history-item";

        const order = document.createElement("span");
        order.className = "history-order";
        order.textContent = `${absentee.absentOrder}.`;

        const name = document.createElement("span");
        name.className = "history-name";
        name.textContent = `${absentee.number} ${getWinnerEnglishName(absentee)}`;

        const extra = document.createElement("span");
        extra.className = "history-extra";
        extra.textContent = [absentee.name !== getWinnerEnglishName(absentee) ? absentee.name : "", absentee.extra].filter(Boolean).join(" · ");

        item.append(order, name, extra);
        elements.absenteeList.appendChild(item);
      });
    }

    function getDrawButtonText() {
      if (state.pendingReplacementCount > 0) {
        return t("drawReplacementButton", { count: state.pendingReplacementCount });
      }

      return state.drawCount > 1 ? t("drawWinnersButton", { count: state.drawCount }) : t("drawWinnerButton");
    }

    function getBigDrawButtonText() {
      if (state.pendingReplacementCount > 0) {
        return t("bigDrawReplacementButton", { count: state.pendingReplacementCount });
      }

      return state.drawCount > 1 ? t("bigDrawWinnersButton", { count: state.drawCount }) : t("bigDrawButton");
    }

    function setControlsDisabled(disabled) {
      elements.csvFile.disabled = disabled;
      elements.drawButton.disabled = disabled;
      elements.bigDrawButton.disabled = disabled;
      elements.absentButton.disabled = disabled;
      elements.restoreAbsentButton.disabled = disabled;
      elements.drawCountInput.disabled = disabled;
      elements.drawCountMinus.disabled = disabled;
      elements.drawCountPlus.disabled = disabled;
      elements.undoButton.disabled = disabled;
      elements.exportButton.disabled = disabled;
      elements.resetButton.disabled = disabled;
      elements.languageButtons.forEach((button) => {
        button.disabled = disabled;
      });
    }

    function setStatus(message) {
      elements.statusMessage.textContent = message;
    }

    function saveState() {
      const payload = {
        language: state.language,
        title: state.title,
        sourceName: state.sourceName,
        participants: state.participants,
        remaining: state.remaining,
        winners: state.winners,
        absentees: state.absentees,
        currentBatch: state.currentBatch,
        current: state.current,
        drawCount: state.drawCount,
        pendingReplacementCount: state.pendingReplacementCount
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function restoreState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        state.title = t("defaultTitle");
        applyTranslations();
        render();
        setStatus(t("statusLoadFile"));
        return;
      }

      try {
        const payload = JSON.parse(saved);
        if (!Array.isArray(payload.participants)) {
          applyTranslations();
          render();
          setStatus(t("statusLoadFile"));
          return;
        }

        state.language = SUPPORTED_LANGUAGES.has(payload.language) ? payload.language : "ko";
        state.title = normalizeTitle(payload.title);
        state.sourceName = payload.sourceName || "";
        state.participants = payload.participants || [];
        state.remaining = payload.remaining || [];
        state.winners = payload.winners || [];
        state.absentees = payload.absentees || [];
        state.current = payload.current || null;
        state.currentBatch = Array.isArray(payload.currentBatch) ? payload.currentBatch : (state.current ? [state.current] : []);
        state.drawCount = normalizeDrawCount(payload.drawCount);
        state.pendingReplacementCount = Number.isInteger(payload.pendingReplacementCount) ? Math.max(0, payload.pendingReplacementCount) : 0;
        applyTranslations();
        render();

        if (state.participants.length > 0) {
          setStatus(t("statusRestoredState"));
        } else {
          setStatus(t("statusLoadFile"));
        }
      } catch (error) {
        console.warn("Saved raffle state could not be restored.", error);
        state.language = "ko";
        state.title = t("defaultTitle");
        applyTranslations();
        render();
        setStatus(t("statusLoadFile"));
      }
    }

    function normalizeTitle(title) {
      const cleanTitle = cleanCell(title);
      return isDefaultTitle(cleanTitle) ? t("defaultTitle") : cleanTitle;
    }

    function isEditingTarget(target) {
      const tagName = target.tagName;
      return tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT" || tagName === "BUTTON" || target.isContentEditable;
    }

    function setDrawCount(count) {
      state.drawCount = normalizeDrawCount(count);
      saveState();
      renderCountsAndHistory();
      setStatus(state.drawCount === 1 ? t("statusSingleMode") : t("statusMultiMode", { count: state.drawCount }));
    }

    function normalizeDrawCount(count) {
      const parsed = Number.parseInt(count, 10);
      if (!Number.isFinite(parsed)) {
        return MIN_DRAW_COUNT;
      }
      return Math.max(MIN_DRAW_COUNT, Math.min(MAX_DRAW_COUNT, parsed));
    }

    elements.csvFile.addEventListener("change", (event) => {
      loadFile(event.target.files[0]);
      event.target.value = "";
    });

    elements.dropZone.addEventListener("dragover", (event) => {
      event.preventDefault();
      elements.dropZone.classList.add("is-dragging");
    });

    elements.dropZone.addEventListener("dragleave", () => {
      elements.dropZone.classList.remove("is-dragging");
    });

    elements.dropZone.addEventListener("drop", (event) => {
      event.preventDefault();
      elements.dropZone.classList.remove("is-dragging");
      loadFile(event.dataTransfer.files[0]);
    });

    elements.eventTitleInput.addEventListener("input", (event) => {
      state.title = event.target.value.trim() || t("defaultTitle");
      elements.eventTitleDisplay.textContent = state.title;
      saveState();
    });

    elements.languageButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setLanguage(button.dataset.language);
      });
    });

    elements.drawCountMinus.addEventListener("click", () => {
      setDrawCount(state.drawCount - 1);
    });

    elements.drawCountPlus.addEventListener("click", () => {
      setDrawCount(state.drawCount + 1);
    });

    elements.drawCountInput.addEventListener("change", (event) => {
      setDrawCount(event.target.value);
    });

    elements.drawCountInput.addEventListener("blur", (event) => {
      event.target.value = state.drawCount;
    });

    elements.winnerBoard.addEventListener("click", (event) => {
      const absentButton = event.target.closest("[data-absent-id]");
      if (!absentButton) {
        return;
      }

      markWinnerAbsentById(absentButton.dataset.absentId);
    });

    elements.drawButton.addEventListener("click", drawWinner);
    elements.bigDrawButton.addEventListener("click", drawWinner);
    elements.absentButton.addEventListener("click", markCurrentAbsent);
    elements.restoreAbsentButton.addEventListener("click", restoreLastAbsent);
    elements.undoButton.addEventListener("click", undoLastWinner);
    elements.exportButton.addEventListener("click", exportWinners);
    elements.resetButton.addEventListener("click", resetDraw);
    elements.fullscreenButton.addEventListener("click", toggleFullscreen);

    document.addEventListener("keydown", (event) => {
      if (isEditingTarget(event.target)) {
        return;
      }

      if (event.key === "Enter" || event.code === "Space") {
        event.preventDefault();
        drawWinner();
      }
    });

    restoreState();
  </script>
</body>
</html>
